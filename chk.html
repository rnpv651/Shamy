<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم بنجاح</title>
    
    <!-- خطوط جوجل (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* نفس الخلفية المستخدمة في صفحة تسجيل الدخول */
            background: linear-gradient(180deg, #18233a 0%, #1c315e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .success-container {
            width: 90%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .icon-container {
            margin-bottom: 20px;
        }

        .icon-container i {
            font-size: 80px;
            color: #4caf50; /* لون أخضر يدل على النجاح */
            /* حركة ظهور الأيقونة */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        .success-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .success-message {
            font-size: 18px;
            color: #a0aec0;
            margin-bottom: 30px;
        }

        .btn-continue {
            background-color: #4da8fa;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-continue:hover {
            background-color: #3b91e0;
        }

        /* تأثير الحركة (أنيميشن) */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon-container">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        
        <h1 class="success-title">مبارك!</h1>
        <p class="success-message">تمت العملية بنجاح</p>

        <!-- يمكنك تغيير مسار الرابط للعودة للصفحة الرئيسية أو لوحة التحكم -->
        <a href="#" class="btn-continue">المتابعة</a>
    </div>

</body>
</html>
